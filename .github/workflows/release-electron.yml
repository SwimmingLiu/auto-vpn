name: Release Electron App

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to rebuild, for example v1.1.0
        required: true

permissions:
  contents: write
  id-token: write

env:
  RELEASE_TAG_NAME: ${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref_name }}
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "180000"
  NPM_CONFIG_FETCH_TIMEOUT: "600000"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_PREFER_OFFLINE: "true"

jobs:
  test:
    name: Test AutoVPN release inputs
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG_NAME }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            npm/autovpn-cli/package-lock.json

      - name: Cache browser runtime downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron-builder/Cache
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-browser-runtime-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-browser-runtime-

      - name: Check release tag and package version
        env:
          TAG_NAME: ${{ env.RELEASE_TAG_NAME }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          NPM_CLI_VERSION="$(node -p "require('./npm/autovpn-cli/package.json').version")"
          if [ "${NPM_CLI_VERSION}" != "${PKG_VERSION}" ]; then
            echo "Version mismatch: package.json=${PKG_VERSION} npm/autovpn-cli=${NPM_CLI_VERSION}"
            exit 1
          fi
          EXPECTED_TAG="v${PKG_VERSION}"
          SHORT_TAG="$(node - <<'NODE'
          const [major, minor, patch] = require('./package.json').version.split('.');
          if (patch === '0') {
            process.stdout.write(`v${major}.${minor}`);
          }
          NODE
          )"
          if [ "${TAG_NAME}" != "${EXPECTED_TAG}" ] && { [ -z "${SHORT_TAG}" ] || [ "${TAG_NAME}" != "${SHORT_TAG}" ]; }; then
            echo "Release tag ${TAG_NAME} does not match package.json version ${PKG_VERSION}."
            echo "Expected ${EXPECTED_TAG}${SHORT_TAG:+ or ${SHORT_TAG}}."
            exit 1
          fi

          bash scripts/ci/retry-command.sh "fetch origin/main" -- \
            git fetch --no-tags origin main:refs/remotes/origin/main
          TAG_COMMIT="$(git rev-list -n 1 "${TAG_NAME}")"
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo "Release tag ${TAG_NAME} is not contained in origin/main."
            exit 1
          fi
        shell: bash

      - name: Install dependencies
        run: |
          bash scripts/ci/retry-command.sh "npm ci" -- npm ci --prefer-offline --no-audit --fund=false
          bash scripts/ci/retry-command.sh "npm ci --prefix npm/autovpn-cli" -- \
            npm ci --prefix npm/autovpn-cli --prefer-offline --no-audit --fund=false

      - name: Build npm CLI web server
        run: npm run build --prefix npm/autovpn-cli

      - name: Run Electron tests
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import { spawnSync } from 'node:child_process';

          const excluded = new Set([
            'app-launch.test.mjs',
            'renderer-e2e.test.mjs',
            'renderer-visual.test.mjs',
            'web-server-e2e.test.mjs',
            'web-server-visual.test.mjs'
          ]);
          const testFiles = fs.readdirSync('electron/tests')
            .filter((file) => file.endsWith('.test.mjs') && !excluded.has(file))
            .sort()
            .map((file) => path.join('electron/tests', file));
          const result = spawnSync(process.execPath, ['--test', '--test-timeout=600000', ...testFiles], {
            stdio: 'inherit',
            timeout: 600000
          });
          if (result.error?.code === 'ETIMEDOUT') {
            console.error('Electron tests timed out after 600 seconds.');
            process.exit(124);
          }
          process.exit(result.status ?? 1);
          NODE

      - name: Run npm CLI wrapper tests
        run: |
          npm test --prefix npm/autovpn-cli

      - name: Run npm CLI parity tests
        run: |
          npm test --prefix npm/autovpn-cli -- --test-name-pattern parity

  prepare-release:
    name: Prepare GitHub Release
    needs: test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG_NAME }}
          fetch-depth: 0

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG_NAME} already exists; keeping it."
            exit 0
          fi
          AUTOVPN_CI_RETRIES=4 bash scripts/ci/retry-command.sh "create release ${RELEASE_TAG_NAME}" -- \
            gh release create "${RELEASE_TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "AutoVPN ${RELEASE_TAG_NAME}" \
              --notes "Release assets are uploading."
        shell: bash

  package-electron:
    name: Package AutoVPN for ${{ matrix.label }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-latest
            package_platform: mac
            package_arch: arm64
          - label: macOS Intel
            os: macos-15-intel
            package_platform: mac
            package_arch: x64
          - label: Linux x64
            os: ubuntu-24.04
            package_platform: linux
            package_arch: x64
          - label: Linux ARM64
            os: ubuntu-24.04-arm
            package_platform: linux
            package_arch: arm64
          - label: Windows x64
            os: windows-2025
            package_platform: win
            package_arch: x64
          - label: Windows ARM64
            os: windows-11-arm
            package_platform: win
            package_arch: arm64

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG_NAME }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            npm/autovpn-cli/package-lock.json

      - name: Cache browser runtime downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron-builder/Cache
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-browser-runtime-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-browser-runtime-

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          bash scripts/ci/retry-command.sh "apt-get update" -- sudo apt-get update
          bash scripts/ci/retry-command.sh "apt-get install packaging dependencies" -- \
            sudo apt-get install -y rpm fakeroot

      - name: Install dependencies
        run: |
          bash scripts/ci/retry-command.sh "npm ci" -- npm ci --prefer-offline --no-audit --fund=false
          bash scripts/ci/retry-command.sh "npm ci --prefix npm/autovpn-cli" -- \
            npm ci --prefix npm/autovpn-cli --prefer-offline --no-audit --fund=false
        shell: bash

      - name: Package Electron app
        env:
          AUTOVPN_PACKAGE_PLATFORM: ${{ matrix.package_platform }}
          AUTOVPN_PACKAGE_ARCH: ${{ matrix.package_arch }}
        run: |
          AUTOVPN_CI_RETRIES=2 AUTOVPN_CI_RETRY_BASE_SECONDS=60 \
            bash scripts/ci/retry-command.sh "package Electron app" -- \
            bash -eo pipefail -c 'rm -rf dist-electron packaging.log; npm run package:electron 2>&1 | tee packaging.log'
        shell: bash

      - name: Verify project icon was packaged
        run: |
          if grep -q "default Electron icon is used" packaging.log; then
            echo "Packaging used the default Electron icon."
            exit 1
          fi

          test -f electron/renderer/assets/vpn-auto-logo-v2-minimal.svg
          test -f electron/build/assets/app-icon-1024.png

          case "${{ matrix.package_platform }}" in
            mac)
              test -f electron/build/assets/app-icon.icns
              app_icon_count="$(find dist-electron -type f -path "*/AutoVPN.app/Contents/Resources/*.icns" -print | wc -l | tr -d ' ')"
              if [ "${app_icon_count}" -eq 0 ]; then
                echo "No .icns resource found under AutoVPN.app/Contents/Resources."
                exit 1
              fi
              ;;
            win)
              test -f electron/build/assets/app-icon.ico
              ;;
          esac
        shell: bash

      - name: Verify release artifacts exist
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"

          case "${{ matrix.package_platform }}-${{ matrix.package_arch }}" in
            mac-arm64|mac-x64)
              required_artifacts=(
                "dist-electron/AutoVPN-${PKG_VERSION}-${{ matrix.package_arch }}.dmg"
              )
              ;;
            linux-x64)
              required_artifacts=(
                "dist-electron/AutoVPN-${PKG_VERSION}-amd64.deb"
                "dist-electron/AutoVPN-${PKG_VERSION}-x86_64.rpm"
              )
              ;;
            linux-arm64)
              required_artifacts=(
                "dist-electron/AutoVPN-${PKG_VERSION}-arm64.deb"
                "dist-electron/AutoVPN-${PKG_VERSION}-aarch64.rpm"
              )
              ;;
            win-x64|win-arm64)
              required_artifacts=(
                "dist-electron/AutoVPN-${PKG_VERSION}-${{ matrix.package_arch }}-setup.exe"
                "dist-electron/AutoVPN-${PKG_VERSION}-${{ matrix.package_arch }}-portable.exe"
              )
              ;;
            *)
              echo "Unsupported package target ${{ matrix.package_platform }}-${{ matrix.package_arch }}."
              exit 1
              ;;
          esac

          missing=0
          for artifact in "${required_artifacts[@]}"; do
            if [ ! -f "${artifact}" ]; then
              echo "Missing release artifact: ${artifact}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            find dist-electron -maxdepth 3 -type f -print
            exit 1
          fi
          printf '%s\n' "${required_artifacts[@]}"
        shell: bash

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_files=()
          while IFS= read -r release_file; do
            release_files+=("${release_file}")
          done < <(
            find dist-electron -type f \( \
              -name '*.dmg' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*-setup.exe' -o \
              -name '*-portable.exe' \
            \) -print
          )
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No Electron release assets found."
            exit 1
          fi
          existing_assets="$(gh release view "${RELEASE_TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')"
          for release_file in "${release_files[@]}"; do
            asset_name="$(basename "${release_file}")"
            if grep -Fxq "${asset_name}" <<<"${existing_assets}"; then
              echo "${asset_name} already exists on ${RELEASE_TAG_NAME}; skipping upload."
              continue
            fi
            AUTOVPN_CI_RETRIES=4 bash scripts/ci/retry-command.sh "upload ${asset_name}" -- \
              gh release upload "${RELEASE_TAG_NAME}" "${release_file}" --repo "${GITHUB_REPOSITORY}"
          done
        shell: bash

  package-cli:
    name: Package AutoVPN CLI
    needs: prepare-release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG_NAME }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            npm/autovpn-cli/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Build CLI package
        run: |
          bash scripts/ci/retry-command.sh "npm ci --prefix npm/autovpn-cli" -- \
            npm ci --prefix npm/autovpn-cli --prefer-offline --no-audit --fund=false
          npm test --prefix npm/autovpn-cli
          mkdir -p dist
          cd npm/autovpn-cli
          npm pack --json --pack-destination ../../dist
        shell: bash

      - name: Verify and smoke CLI artifact
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          NPM_CLI_VERSION="$(node -p "require('./npm/autovpn-cli/package.json').version")"
          if [ "${NPM_CLI_VERSION}" != "${PKG_VERSION}" ]; then
            echo "CLI artifact version mismatch: package.json=${PKG_VERSION} npm/autovpn-cli=${NPM_CLI_VERSION}"
            exit 1
          fi
          test -f "dist/swimmingliu-autovpn-${PKG_VERSION}.tgz"
          npm exec --yes --package="./dist/swimmingliu-autovpn-${PKG_VERSION}.tgz" -- autovpn --version | grep -Fx "autovpn ${PKG_VERSION}"
          npm exec --yes --package="./dist/swimmingliu-autovpn-${PKG_VERSION}.tgz" -- autovpn --help >/dev/null
        shell: bash

      - name: Publish npm CLI package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME="$(node -p "require('./npm/autovpn-cli/package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./npm/autovpn-cli/package.json').version")"
          PACKAGE_TARBALL="dist/swimmingliu-autovpn-${PACKAGE_VERSION}.tgz"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
            exit 0
          fi
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION} with NPM_TOKEN."
          else
            echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION} with npm trusted publishing/OIDC."
          fi
          for attempt in 1 2 3; do
            if npm publish "${PACKAGE_TARBALL}" --access public --provenance --registry=https://registry.npmjs.org; then
              exit 0
            fi
            if AUTOVPN_CI_RETRIES=3 AUTOVPN_CI_RETRY_BASE_SECONDS=10 \
              bash scripts/ci/retry-command.sh "verify npm publication visibility" -- \
              npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null; then
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is visible after a failed publish response; treating publish as complete."
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep_seconds=$(( 30 * attempt ))
            echo "npm publish failed; retrying in ${sleep_seconds} seconds."
            sleep "${sleep_seconds}"
          done
        shell: bash

      - name: Upload CLI release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          release_files=("dist/swimmingliu-autovpn-${PKG_VERSION}.tgz")
          test -f "${release_files[0]}"
          existing_assets="$(gh release view "${RELEASE_TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')"
          for release_file in "${release_files[@]}"; do
            asset_name="$(basename "${release_file}")"
            if grep -Fxq "${asset_name}" <<<"${existing_assets}"; then
              echo "${asset_name} already exists on ${RELEASE_TAG_NAME}; skipping upload."
              continue
            fi
            AUTOVPN_CI_RETRIES=4 bash scripts/ci/retry-command.sh "upload ${asset_name}" -- \
              gh release upload "${RELEASE_TAG_NAME}" "${release_file}" --repo "${GITHUB_REPOSITORY}"
          done
        shell: bash

  publish-release-notes:
    name: Publish release notes
    needs:
      - package-electron
      - package-cli
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG_NAME }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Generate release notes
        run: |
          RELEASE_NOTES_CREATED_AT="$(TZ=Asia/Shanghai date)" \
            node scripts/generate-release-notes.mjs "${RELEASE_TAG_NAME}" "${GITHUB_REPOSITORY}" > release-notes.md
        shell: bash

      - name: Update GitHub release body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          AUTOVPN_CI_RETRIES=4 bash scripts/ci/retry-command.sh "update release notes" -- \
            gh release edit "${RELEASE_TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "AutoVPN ${RELEASE_TAG_NAME}" \
            --notes-file release-notes.md
        shell: bash
