name: Release Electron App

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package-macos:
    name: Package AutoVPN for macOS
    runs-on: macos-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Python tests
        run: ./scripts/run_pytest.sh tests -v

      - name: Install Playwright browsers for tests
        run: npx playwright install chromium-headless-shell

      - name: Run Electron tests
        run: |
          python - <<'PY'
          import glob
          import os
          import signal
          import subprocess
          import sys

          test_files = sorted(glob.glob("electron/tests/*.test.mjs"))
          command = ["node", "--test", "--test-timeout=600000", *test_files]
          process = subprocess.Popen(command, start_new_session=True)
          try:
              raise SystemExit(process.wait(timeout=600))
          except subprocess.TimeoutExpired:
              print("Electron tests timed out after 600 seconds.", file=sys.stderr)
              os.killpg(process.pid, signal.SIGTERM)
              try:
                  process.wait(timeout=10)
              except subprocess.TimeoutExpired:
                  os.killpg(process.pid, signal.SIGKILL)
              raise SystemExit(124)
          PY

      - name: Package Electron app
        run: |
          set -o pipefail
          npm run package:electron 2>&1 | tee packaging.log

      - name: Verify project icon was packaged
        run: |
          if grep -q "default Electron icon is used" packaging.log; then
            echo "Packaging used the default Electron icon."
            exit 1
          fi

          test -f electron/renderer/assets/vpn-auto-logo-v2-minimal.svg
          test -f electron/build/assets/app-icon.icns

          app_icon_count="$(find "dist-electron/mac-"*"/AutoVPN.app/Contents/Resources" -name "*.icns" -print | wc -l | tr -d ' ')"
          if [ "${app_icon_count}" -eq 0 ]; then
            echo "No .icns resource found under AutoVPN.app/Contents/Resources."
            exit 1
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist-electron/**/*.dmg
            dist-electron/**/*.blockmap
