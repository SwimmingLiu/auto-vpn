name: Headless CLI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "180000"
  NPM_CONFIG_FETCH_TIMEOUT: "600000"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_PREFER_OFFLINE: "true"

jobs:
  headless:
    name: Linux headless CLI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            npm/autovpn-cli/package-lock.json

      - name: Cache browser runtime downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron-builder/Cache
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-browser-runtime-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-browser-runtime-

      - name: Install Node dependencies
        run: |
          bash scripts/ci/retry-command.sh "npm ci" -- npm ci --prefer-offline --no-audit --fund=false

      - name: Install npm CLI dependencies
        run: |
          bash scripts/ci/retry-command.sh "npm ci --prefix npm/autovpn-cli" -- \
            npm ci --prefix npm/autovpn-cli --prefer-offline --no-audit --fund=false

      - name: Install pinned Playwright Chromium and WebKit runtimes
        run: npx playwright install --with-deps chromium-headless-shell webkit

      - name: Run H5 mobile Chromium and WebKit gate
        run: UPDATE_VISUAL_BASELINES=1 npm run test:h5

      - name: Upload captured Linux H5 baselines
        uses: actions/upload-artifact@v4
        with:
          name: linux-h5-visual-baselines
          path: electron/tests/visual-baselines/h5/linux/**

      - name: Run Electron native and desktop gate
        run: npm run test:electron-native

      - name: Upload renderer visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-renderer-visual-diffs
          path: electron/tests/visual-artifacts/**
          if-no-files-found: ignore

      - name: Run npm CLI wrapper tests
        run: |
          npm test --prefix npm/autovpn-cli

      - name: Run npm CLI parity tests
        run: |
          npm test --prefix npm/autovpn-cli -- --test-name-pattern parity

      - name: Pack npm CLI wrapper
        run: |
          cd npm/autovpn-cli
          npm pack --json --pack-destination .

      - name: Smoke npm CLI wrapper
        run: |
          npx -y ./npm/autovpn-cli/*.tgz --help
          npx -y ./npm/autovpn-cli/*.tgz --version
          npx -y ./npm/autovpn-cli/*.tgz doctor --project-root "$PWD" --output json > npm-doctor.json || npm_doctor_status=$?
          node -e "JSON.parse(require('node:fs').readFileSync('npm-doctor.json', 'utf8'))"
          echo "npm_doctor_status=${npm_doctor_status:-0}"

      - name: Smoke headless CLI
        run: |
          node npm/autovpn-cli/bin/autovpn.mjs profile summary --project-root "$PWD" --json
          node npm/autovpn-cli/bin/autovpn.mjs artifacts latest --project-root "$PWD"
          node npm/autovpn-cli/bin/autovpn.mjs artifacts list --project-root "$PWD"
          node npm/autovpn-cli/bin/autovpn.mjs doctor --project-root "$PWD" --output json > doctor.json || doctor_status=$?
          node -e "JSON.parse(require('node:fs').readFileSync('doctor.json', 'utf8'))"
          echo "doctor_status=${doctor_status:-0}"

  electron-package:
    name: Linux Electron package
    needs: headless
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            npm/autovpn-cli/package-lock.json

      - name: Cache browser runtime downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron-builder/Cache
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-browser-runtime-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-browser-runtime-

      - name: Install Linux packaging dependencies
        run: |
          bash scripts/ci/retry-command.sh "apt-get update" -- sudo apt-get update
          bash scripts/ci/retry-command.sh "apt-get install packaging dependencies" -- \
            sudo apt-get install -y rpm fakeroot

      - name: Install dependencies
        run: |
          bash scripts/ci/retry-command.sh "npm ci" -- npm ci --prefer-offline --no-audit --fund=false
          bash scripts/ci/retry-command.sh "npm ci --prefix npm/autovpn-cli" -- \
            npm ci --prefix npm/autovpn-cli --prefer-offline --no-audit --fund=false

      - name: Package Electron app
        env:
          AUTOVPN_PACKAGE_PLATFORM: linux
          AUTOVPN_PACKAGE_ARCH: x64
        run: |
          AUTOVPN_CI_RETRIES=2 AUTOVPN_CI_RETRY_BASE_SECONDS=60 \
            bash scripts/ci/retry-command.sh "package Electron app" -- \
            bash -eo pipefail -c 'rm -rf dist-electron packaging.log; npm run package:electron 2>&1 | tee packaging.log'
        shell: bash

      - name: Verify Electron package output
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"

          if grep -q "default Electron icon is used" packaging.log; then
            echo "Packaging used the default Electron icon."
            exit 1
          fi

          test -f "dist-electron/AutoVPN-${PKG_VERSION}-amd64.deb"
          test -f "dist-electron/AutoVPN-${PKG_VERSION}-x86_64.rpm"
          test -f electron/build/assets/app-icon-1024.png
          grep -q "sidebarVersion: 'v.${PKG_VERSION}'" dist-electron/linux-unpacked/resources/app/electron/renderer/i18n.js
          dpkg-deb -c "dist-electron/AutoVPN-${PKG_VERSION}-amd64.deb" > deb-contents.txt
          grep -q "vpn-subscription-automation.png" deb-contents.txt
        shell: bash

      - name: Upload Electron package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autovpn-electron-linux-x64
          path: |
            dist-electron/*.deb
            dist-electron/*.rpm
            packaging.log
