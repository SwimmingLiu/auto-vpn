<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPN Subscription Automation</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="dashboard">
    <div class="workspace-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark">VA</div>
          <div class="brand-copy">
            <div id="sidebarTitle" class="sidebar-title"></div>
            <div id="sidebarVersion" class="sidebar-version"></div>
          </div>
        </div>

        <nav id="sidebarNav" class="sidebar-nav"></nav>

        <section class="status-card">
          <div class="status-card-head">
            <h2 id="sidebarStatusTitle"></h2>
            <span id="sidebarStatusBadge" class="badge neutral"></span>
          </div>
          <div id="sidebarStatusBody" class="status-card-body"></div>
        </section>
      </aside>

      <div class="main-shell">
        <header class="topbar">
          <div class="topbar-heading">
            <div class="page-title-row">
              <h1 id="pageTitle"></h1>
              <span id="runStateBadge" class="badge neutral"></span>
            </div>
            <p id="pageSubtitle"></p>
          </div>

          <div id="shortcutStrip" class="shortcut-strip"></div>

          <div class="topbar-actions">
            <button id="projectBtn" class="btn btn-secondary"></button>
            <button id="topSettingsBtn" class="btn btn-secondary"></button>
            <label class="language-control">
              <span id="languageLabel"></span>
              <select id="languageSelect">
                <option value="zh-CN">中文</option>
                <option value="en-US">English</option>
              </select>
            </label>
            <button id="saveBtn" class="btn btn-secondary"></button>
            <button id="stopBtn" class="btn btn-danger"></button>
            <button id="runBtn" class="btn btn-primary"></button>
          </div>
        </header>

        <main id="pageContent" class="page-content"></main>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
