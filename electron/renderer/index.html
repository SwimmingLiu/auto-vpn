<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPN Subscription Automation</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div>
            <div id="brandTitle" class="brand-title"></div>
            <div id="brandSubtitle" class="brand-subtitle"></div>
          </div>
        </div>
        <nav class="nav">
          <button id="navOverview" class="nav-item active"></button>
          <button id="navSources" class="nav-item"></button>
          <button id="navSpeedTest" class="nav-item"></button>
          <button id="navDeploy" class="nav-item"></button>
          <button id="navHistory" class="nav-item"></button>
        </nav>
        <div class="sidebar-footer">
          <div id="sidebarPillPages" class="sidebar-pill"></div>
          <div id="sidebarPillPipeline" class="sidebar-pill"></div>
        </div>
      </aside>

      <main class="main">
        <section class="hero">
          <div class="hero-copy">
            <div id="eyebrow" class="eyebrow"></div>
            <h1 id="heroTitle"></h1>
            <p id="heroBody"></p>
          </div>
          <div class="hero-actions">
            <label class="language-control">
              <span id="languageLabel"></span>
              <select id="languageSelect">
                <option value="zh-CN">中文</option>
                <option value="en-US">English</option>
              </select>
            </label>
            <button id="saveBtn" class="btn btn-secondary"></button>
            <button id="runBtn" class="btn btn-primary"></button>
          </div>
        </section>

        <section class="content-grid">
          <div class="column main-column">
            <div class="card">
              <div class="card-header">
                <h2 id="sourceMatrixTitle"></h2>
                <span id="sourceMatrixSubtitle" class="muted"></span>
              </div>
              <div id="sourcesGrid" class="sources-grid"></div>
            </div>

            <div class="card">
              <div class="card-header">
                <h2 id="pipelineTitle"></h2>
                <span id="pipelineSubtitle" class="muted"></span>
              </div>
              <div class="form-grid">
                <label class="field">
                  <span id="minSpeedLabel"></span>
                  <input id="minSpeed" type="number" step="0.1" />
                </label>
                <label class="field">
                  <span id="timeoutSecondsLabel"></span>
                  <input id="timeoutSeconds" type="number" />
                </label>
                <label class="field">
                  <span id="concurrencyLabel"></span>
                  <input id="concurrency" type="number" />
                </label>
                <label class="field field-wide">
                  <span id="projectNameLabel"></span>
                  <input id="projectName" type="text" />
                </label>
                <label class="field field-wide">
                  <span id="pagesProjectUrlLabel"></span>
                  <input id="pagesProjectUrl" type="text" />
                </label>
                <label class="field field-wide">
                  <span id="subscriptionUrlLabel"></span>
                  <input id="subscriptionUrl" type="text" />
                </label>
                <label class="field field-wide">
                  <span id="speedUrlsLabel"></span>
                  <textarea id="speedUrls" rows="4"></textarea>
                </label>
              </div>
            </div>
          </div>

          <div class="column side-column">
            <div class="card">
              <div class="card-header">
                <h2 id="metricsTitle"></h2>
                <span id="metricsSubtitle" class="muted"></span>
              </div>
              <div id="metrics" class="metrics"></div>
            </div>

            <div class="card">
              <div class="card-header">
                <h2 id="stagesTitle"></h2>
                <span id="stagesSubtitle" class="muted"></span>
              </div>
              <div id="stages" class="stage-list"></div>
            </div>

            <div class="card">
              <div class="card-header">
                <h2 id="logsTitle"></h2>
                <span id="logsSubtitle" class="muted"></span>
              </div>
              <pre id="logOutput" class="log-output"></pre>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
