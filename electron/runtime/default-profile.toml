[speed_test]
min_download_mb_s = 0.5
timeout_seconds = 20
concurrency = 3
urls = ["https://raw.githubusercontent.com/bulianglin/demo/main/10MB.bin", "https://speed.cloudflare.com/__down?bytes=5000000"]
probe_url = "https://www.gstatic.com/generate_204"
max_download_bytes = 5000000
startup_wait_seconds = 1.0
max_download_candidates = 50

[deploy]
project_name = "sub-nodes"
subscription_url = ""
verify_subscription_url = ""
pages_project_url = "https://sub-nodes.pages.dev"
secret_query = ""
account_id = ""
use_wrangler = true
min_final_links = 10

[worker_build]
environment_name = "production"
entry_filename = "_worker.js"
bundle_subdir = "pages_bundle"
modules_subdir = "modules"
manifest_filename = "manifest.json"
variable_prefix = "sg"
comment_template = "subscription worker: returns encoded payload on secret match, random bytes otherwise"
random_noise_min_length = 24
random_noise_max_length = 96
enable_keyword_fragmentation = true
enable_identifier_randomization = true
emit_sidecar_modules = true

[filters]
excluded_country_codes = ["CN"]
